<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: none">

    <div id="navbarContainer"></div>

    <div class="container py-4">
        <h3>Admin Panel</h3>
        <p class="text-muted">View all registered users and food donations on the platform.</p>

        <div id="messageBox" class="alert d-none" role="alert"></div>

        <!-- Tabs to switch between Users / Donations / Requests -->
        <ul class="nav nav-tabs mt-3" id="adminTabs">
            <li class="nav-item">
                <button class="nav-link active" data-tab="users">Users</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="donations">Donations</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="requests">Requests</button>
            </li>
        </ul>

        <!-- Users Table -->
        <div id="usersSection" class="tab-section mt-3">
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Donations Table (hidden by default) -->
        <div id="donationsSection" class="tab-section mt-3 d-none">
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Food</th>
                            <th>Quantity</th>
                            <th>Expiry</th>
                            <th>Pickup Address</th>
                            <th>Donor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="donationsBody">
                        <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Requests Table (hidden by default) -->
        <div id="requestsSection" class="tab-section mt-3 d-none">
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Food</th>
                            <th>Donor</th>
                            <th>Receiver</th>
                            <th>Status</th>
                            <th>Requested On</th>
                        </tr>
                    </thead>
                    <tbody id="requestsBody">
                        <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
