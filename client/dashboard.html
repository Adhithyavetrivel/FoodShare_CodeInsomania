<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbarContainer"></div>

    <div class="container py-4">
        <h3 id="welcomeText">My Dashboard</h3>
        <p class="text-muted">Manage your donations and requests here.</p>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm p-4 text-center">
                    <h5>Have food to share?</h5>
                    <a href="add-donation.html" class="btn btn-success mt-2">+ Add New Donation</a>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm p-4 text-center">
                    <h5>Looking for food?</h5>
                    <a href="donations.html" class="btn btn-outline-success mt-2">Browse All Donations</a>
                </div>
            </div>
        </div>

        <hr class="my-4">

        <h4>My Donations</h4>
        <!-- My donations table will be filled by JS -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover bg-white">
                <thead class="table-success">
                    <tr>
                        <th>Food Name</th>
                        <th>Quantity</th>
                        <th>Expiry Date</th>
                        <th>Pickup Address</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="myDonationsBody">
                    <!-- Rows inserted dynamically -->
                    <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/my-donations.js"></script>
    <!-- my-donations.js will be added in Step 6 once the donation API exists -->
</body>
</html>
