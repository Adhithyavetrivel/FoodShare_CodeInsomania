<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Donation - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbarContainer"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm p-4">
                    <h3 class="mb-4">Add Food Donation</h3>

                    <div id="messageBox" class="alert d-none" role="alert"></div>

                    <form id="donationForm">
                        <div class="mb-3">
                            <label class="form-label">Food Name</label>
                            <input type="text" class="form-control" id="food_name" placeholder="e.g., Rice, Bread, Vegetables" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="text" class="form-control" id="quantity" placeholder="e.g., 5 kg, 10 packets" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" class="form-control" id="expiry_date" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pickup Address</label>
                            <textarea class="form-control" id="pickup_address" rows="3" placeholder="Full address where the food can be picked up" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Submit Donation</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/add-donation.js"></script>
</body>
</html>
