<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Donations - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbarContainer"></div>

    <div class="container py-4">
        <h3 class="mb-1">Available Food Donations</h3>
        <p class="text-muted">Browse donations shared by the community and request what you need.</p>

        <div id="messageBox" class="alert d-none" role="alert"></div>

        <!-- Donation cards will be inserted here by JS -->
        <div class="row g-3 mt-2" id="donationsContainer">
            <p class="text-center text-muted">Loading donations...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/donations.js"></script>
</body>
</html>
